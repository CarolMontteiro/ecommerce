<section id="" class="bg-[#034AAD]">
     <div class="container mx-auto">
         <div class="relative w-full overflow-hidden">
            <img 
             class="w-full h-[400px] object-cover transition duration-500"
             [src]="items()[currentIndex()]?.image" 
             [alt]="items()[currentIndex()]?.alt"
             loading="lazy"
            >
         </div>
         

        <button class="nav prev absolute left-4 top-1/2 -translate-y-1/2 text-white text-4xl transition-all duration-300 ease-in-out cursor-pointer hover:text-5xl" 
                (click)="prev()">
                <i class="fa-solid fa-angle-left"></i>
        </button>
        <button class="nav next absolute right-4 top-1/2 -translate-y-1/2 text-white text-4xl transition-all duration-300 ease-in-out cursor-pointer hover:text-5xl" 
                (click)="next()">
                <i class="fa-solid fa-angle-right"></i>
        </button>

    </div>
 </section>
