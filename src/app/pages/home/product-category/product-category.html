<section>
     <div class="container mx-auto">
        <div class="category-product py-5 flex justify-around">
        @for (item of categoriesItems(); track item.name) {
            <a 
             href="#" 
             class="w-40 text-center mt-5 group hover:transform hover:scale-110"
             >
                <div class="w-[75px] h-[75px] sm:w-20 sm:h-20 xl:w-[90px] xl:h-[90px] p-2 mx-auto bg-blue-800 border-4 border-yellow-600 rounded-full">
                    <img class="w-full p-1.5" [src]="item.image" [alt]="item.name">
                </div>
                <h3 class="mt-2 text-zinc-500 text-sm font-semibold group-hover:text-blue-800">
                    {{ item.name }}
                </h3>
            </a>
        }
         </div>
     </div>
 </section>
